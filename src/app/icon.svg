<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark navy rounded square -->
  <rect width="512" height="512" rx="108" fill="#0F172A"/>

  <!-- Connection lines (drawn first, behind nodes) -->
  <!-- Center to top-left -->
  <line x1="256" y1="256" x2="148" y2="156" stroke="#1E3A5F" stroke-width="20" stroke-linecap="round"/>
  <!-- Center to top-right -->
  <line x1="256" y1="256" x2="364" y2="156" stroke="#1E3A5F" stroke-width="20" stroke-linecap="round"/>
  <!-- Center to bottom-left -->
  <line x1="256" y1="256" x2="148" y2="356" stroke="#1E3A5F" stroke-width="20" stroke-linecap="round"/>
  <!-- Center to bottom-right -->
  <line x1="256" y1="256" x2="364" y2="356" stroke="#1E3A5F" stroke-width="20" stroke-linecap="round"/>

  <!-- Glow lines (brighter, thinner) -->
  <line x1="256" y1="256" x2="148" y2="156" stroke="#38BDF8" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="256" x2="364" y2="156" stroke="#38BDF8" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="256" x2="148" y2="356" stroke="#38BDF8" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="256" y1="256" x2="364" y2="356" stroke="#38BDF8" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- Top-left node: Outer page / site -->
  <circle cx="148" cy="156" r="34" fill="#1E293B" stroke="#38BDF8" stroke-width="6"/>
  <circle cx="148" cy="156" r="14" fill="#38BDF8"/>

  <!-- Top-right node: Outer page / site -->
  <circle cx="364" cy="156" r="34" fill="#1E293B" stroke="#A78BFA" stroke-width="6"/>
  <circle cx="364" cy="156" r="14" fill="#A78BFA"/>

  <!-- Bottom-left node: Depth page -->
  <circle cx="148" cy="356" r="28" fill="#1E293B" stroke="#22D3EE" stroke-width="5"/>
  <circle cx="148" cy="356" r="11" fill="#22D3EE"/>

  <!-- Bottom-right node: Depth page -->
  <circle cx="364" cy="356" r="28" fill="#1E293B" stroke="#22D3EE" stroke-width="5"/>
  <circle cx="364" cy="356" r="11" fill="#22D3EE"/>

  <!-- Center hub: Main analysis node (largest) -->
  <circle cx="256" cy="256" r="52" fill="#0F172A" stroke="#38BDF8" stroke-width="7"/>
  <circle cx="256" cy="256" r="38" fill="#38BDF8" opacity="0.15"/>
  <!-- AI Sparkle / check mark inside center node -->
  <path d="M236 258L250 272L278 240" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
